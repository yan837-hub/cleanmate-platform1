server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: cleanmate-backend

  datasource:
    url: jdbc:mysql://localhost:3306/cleaning_service?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      # password:  # Redis未设密码时注释掉

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cleanmate.entity

# JWT 配置
jwt:
  secret: cleanmate-jwt-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 86400000      # 24小时（毫秒）
  refresh-expiration: 604800000  # 7天（毫秒）
  header: Authorization
  prefix: "Bearer "

# 文件上传配置
upload:
  path: ./uploads/
  url-prefix: http://localhost:8080/api/files/

# 高德地图 Web 服务 Key（地理编码）
amap:
  key: 30a2a052b267d5cdc2cada62947605d2

logging:
  level:
    com.cleanmate: debug
    com.baomidou: info
